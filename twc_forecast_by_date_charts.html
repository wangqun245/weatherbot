  for(let i=0;i<=5;i++){const y=m.t+i*(H-m.t-m.b)/5; const val=maxY-i*(maxY-minY)/5; svg.insertAdjacentHTML('beforeend',`<line class="grid" x1="${m.l}" y1="${y}" x2="${W-m.r}" y2="${y}"/><text class="label" x="8" y="${y+4}">${val.toFixed(1)}</text>`)}
  for(let i=0;i<=6;i++){const t=minT+i*(maxT-minT)/6; const x=xs(t); svg.insertAdjacentHTML('beforeend',`<line class="grid" x1="${x}" y1="${m.t}" x2="${x}" y2="${H-m.b}"/><text class="label" x="${x-20}" y="${H-14}">${fmtTime(t)}</text>`)}
  svg.insertAdjacentHTML('beforeend',`<line class="axis" x1="${m.l}" y1="${H-m.b}" x2="${W-m.r}" y2="${H-m.b}"/><line class="axis" x1="${m.l}" y1="${m.t}" x2="${m.l}" y2="${H-m.b}"/>`);
  let isolated=null;
  const entries=[];
  function apply(){entries.forEach((e,i)=>{const dim=isolated!==null&&isolated!==i; e.line.classList.toggle('dim',dim); e.pts.forEach(c=>c.classList.toggle('dim',dim)); e.btn.classList.toggle('hidden',dim); e.btn.classList.toggle('isolated',isolated===i);});}
  function toggle(i){isolated=isolated===i?null:i; apply();}
  group.series.forEach((s,i)=>{
    const line=document.createElementNS('http://www.w3.org/2000/svg','path'); line.setAttribute('d',pathFor(s.points,xs,ys)); line.setAttribute('class','line'); line.setAttribute('stroke',color(i)); line.addEventListener('click',()=>toggle(i)); svg.appendChild(line);
    const pts=[];
    s.points.forEach(p=>{const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('cx',xs(p.t)); c.setAttribute('cy',ys(p.y)); c.setAttribute('r',2.6); c.setAttribute('fill',color(i)); c.setAttribute('class','pt'); c.addEventListener('click',(ev)=>{ev.stopPropagation(); toggle(i)}); c.addEventListener('mousemove',(ev)=>{tip.style.display='block';tip.style.left=(ev.clientX+12)+'px';tip.style.top=(ev.clientY+12)+'px';tip.innerHTML=`<b>${s.city}</b><br>${p.x}<br>forecast: ${p.y}?${group.unit}<br>yes price: ${p.price??''}<br>station: ${p.station}`}); c.addEventListener('mouseleave',()=>tip.style.display='none'); svg.appendChild(c); pts.push(c);});
    const btn=document.createElement('button'); btn.innerHTML=`<span class="sw" style="background:${color(i)}"></span><span>${s.city}</span>`; btn.addEventListener('click',()=>toggle(i)); legend.appendChild(btn);
    entries.push({line,pts,btn});
  });
  reset.addEventListener('click',()=>{isolated=null;apply();});
}
chartData.forEach(renderGroup);
</script></body></html>
